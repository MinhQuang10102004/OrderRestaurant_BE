services:
  # Backend: NestJS + Prisma (connects to remote DB via DATABASE_URL in .env)
  backend:
    image: dton04/order-restaurant-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order_restaurant_api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-3000}
    ports:
      - "8080:3000"
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"
    networks:
      - restaurant_network

  # Frontend: React (Nginx)
  frontend:
    image: dton04/order-restaurant-frontend:latest
    build:
      context: ../Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: order_restaurant_ui
    restart: always
    depends_on:
      - backend
    ports:
      - "3001:80" 
    networks:
      - restaurant_network

networks:
  restaurant_network:
    driver: bridge
