version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: order_restaurant_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: order_restaurant
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
